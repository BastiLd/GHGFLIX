# ============================================================================
# GHGFlix Server für ZimaOS — einfach kopieren & einfügen!
# ZimaOS: App Store → oben rechts "+" → "Install a customized app" →
#         "Import" → diese Datei einfügen → Install (nichts anpassen nötig).
#         Danach: http://<zimaboard-ip>:8484 öffnen.
#
# MEHRERE PLATTEN: Das GESAMTE ZimaOS-Dateisystem wird read-only unter /host
# eingebunden. So findest du in der Weboberfläche (Einstellungen → Bibliotheken)
# JEDE Platte und JEDEN Ordner — egal, wo ZimaOS sie einhängt (/DATA, /media,
# Netzwerkfreigaben, …). Kein Raten von Pfaden mehr. "Automatisch erkennen"
# durchsucht das Ganze und schlägt Film-/Serienordner vor.
#
# WICHTIG: In ZimaOS KEINE Volume-Zeile leer lassen (leere "Source" führt zu
# "field Source must not be empty").
# ============================================================================
services:
  ghgflix:
    image: ghcr.io/bastild/ghgflix-server:latest
    # Kein fertiges Image? Dann stattdessen direkt von GitHub bauen (Zeile
    # oben auskommentieren, diese aktivieren):
    # build: https://github.com/BastiLd/GHGFLIX.git#main:server
    container_name: ghgflix
    restart: unless-stopped
    ports:
      - "8484:8484"
    volumes:
      # Gesamtes ZimaOS read-only -> im Ordner-Browser findest du ALLES.
      - /:/host:ro
      # Datenbank + Bild-Cache (schreibbar, echter Host-Pfad):
      - /DATA/AppData/ghgflix/data:/data
    environment:
      # TMDb-Key für Poster/Beschreibungen (kann auch später in der
      # Web-Oberfläche → Einstellungen gesetzt werden):
      TMDB_API_KEY: ""
      TMDB_LANG: "de-DE"
      # Optionales Login-Passwort (empfohlen, sobald der Server per Domain
      # oder Tailscale von außen erreichbar ist; leer = kein Login):
      GHGFLIX_PASSWORD: ""
      # Bibliothek automatisch neu scannen (Sekunden):
      SCAN_INTERVAL_SEC: "1800"
      # Optional: Supabase-Sync (BRAUCHT den Service-Role-Key, nicht den
      # anon-Key). Am einfachsten über die Web-Einstellungen setzen
      # (Einstellungen → Konto & Sync → "Server-Sync mit Supabase"):
      SUPABASE_URL: ""
      SUPABASE_SERVICE_KEY: ""
      # Optional: nur Profile EINES Supabase-Kontos syncen (Auth-User-ID) —
      # nur nötig, wenn sich mehrere Konten ein Supabase-Projekt teilen:
      SUPABASE_USER_ID: ""
