# ============================================================================
# GHGFlix Server für ZimaOS — einfach kopieren & einfügen!
# ZimaOS: App Store → oben rechts "+" → "Install a customized app" →
#         "Import" → diese Datei einfügen → Install (nichts anpassen nötig).
#         Danach: http://<zimaboard-ip>:8484 öffnen.
#
# MEHRERE PLATTEN werden automatisch alle eingebunden (/DATA-Pool + externe
# Platten unter /media). In der GHGFlix-Weboberfläche unter Einstellungen →
# Bibliotheken auf "Automatisch erkennen" klicken — findet Film-/Serienordner
# auf ALLEN Platten von selbst. Oder per "Ordner hinzufügen" durch alle
# Laufwerke klicken (klicken statt Pfade tippen).
#
# WICHTIG: In ZimaOS KEINE Volume-Zeile leer lassen (leere "Source" führt zu
# "field Source must not be empty"). Es werden ausschließlich echte Pfade
# benutzt — keine benannten Volumes (die ZimaOS nicht abbilden kann).
# ============================================================================
services:
  ghgflix:
    image: ghcr.io/bastild/ghgflix-server:latest
    # Kein fertiges Image? Dann stattdessen direkt von GitHub bauen (Zeile
    # oben auskommentieren, diese aktivieren):
    # build: https://github.com/BastiLd/GHGFLIX.git#main:server
    container_name: ghgflix
    restart: unless-stopped
    ports:
      - "8484:8484"
    volumes:
      # ALLE Platten werden eingebunden, damit du in der Weboberfläche
      # (Einstellungen → Bibliotheken → Automatisch erkennen) jede findest:
      #  • /DATA  = ZimaOS-Speicherpool (alle gepoolten Platten in einem)
      #  • /media = extern/USB angeschlossene Platten
      # Beide read-only. Normalerweise musst du hier GAR NICHTS ändern.
      - /DATA:/DATA:ro
      - /media:/media:ro
      # Weitere Sonder-Mountpunkte? Einfach dazuhängen, z.B.:
      # - /mnt/nas:/mnt/nas:ro
      # Datenbank + Bild-Cache (echter Host-Pfad statt benanntem Volume):
      - /DATA/AppData/ghgflix/data:/data
    environment:
      # TMDb-Key für Poster/Beschreibungen (kann auch später in der
      # Web-Oberfläche → Einstellungen gesetzt werden):
      TMDB_API_KEY: ""
      TMDB_LANG: "de-DE"
      # Optionales Login-Passwort (empfohlen, sobald der Server per Domain
      # oder Tailscale von außen erreichbar ist; leer = kein Login):
      GHGFLIX_PASSWORD: ""
      # Bibliothek automatisch neu scannen (Sekunden):
      SCAN_INTERVAL_SEC: "1800"
      # Optional: Supabase-Sync (BRAUCHT den Service-Role-Key, nicht den
      # anon-Key). Am einfachsten über die Web-Einstellungen setzen:
      SUPABASE_URL: ""
      SUPABASE_SERVICE_KEY: ""
