# Builds the GHGFlix server image and publishes it to GitHub Container
# Registry on every push (to main, or the feature branch below) that touches
# server/ — so the ZimaOS docker-compose can simply pull
# ghcr.io/bastild/ghgflix-server:latest.
name: Publish server image

on:
  push:
    branches: [main, feature/zimaos-docker-server]
    paths: ["server/**", ".github/workflows/docker.yml"]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          # amd64 for ZimaBoard/ZimaCube, arm64 for Pi & ARM-NAS
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/bastild/ghgflix-server:latest
            ghcr.io/bastild/ghgflix-server:${{ github.sha }}
