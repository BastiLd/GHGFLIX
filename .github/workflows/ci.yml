# QA-003/OPS-001: Basis-Checks bei jedem Push — TypeScript-Compile des
# Frontends und Syntax-Check aller Server-Module. Verhindert, dass kaputte
# Commits im Docker-Image landen.
name: Checks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: TypeScript (Frontend + Desktop-Shell)
        run: npx tsc --noEmit
      - name: Web-Build (identisch zum Docker-Build)
        run: npm run build:web
      - name: Server-Module Syntax
        run: |
          for f in server/src/*.js; do node --check "$f"; done
      - name: mobile/app.json valide
        run: node -e "JSON.parse(require('fs').readFileSync('mobile/app.json','utf8'))"
